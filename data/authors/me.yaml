bio: >
  I am a Ph.D. student in the CURE Lab at The Chinese University of Hong Kong,
  advised by Prof. Qiang Xu. My research interests include AI for EDA, graph
  representation learning, neural reasoning, diffusion models, and LLM
  compression. Before joining CUHK, I received my bachelor's degree in
  Mathematical Sciences from Harbin Institute of Technology (Shenzhen), where I
  majored in Data Science within the Mathematics discipline. I am always open to
  research collaboration and discussion. Email: zyzheng23@cse.cuhk.edu.hk.
